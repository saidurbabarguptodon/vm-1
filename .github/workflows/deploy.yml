name: Deploy VM-1

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: vm-1
  cancel-in-progress: false

env:
  VM_NAME: vm-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Fast combined install + sync + app start ----
      - name: Setup environment
        run: |
          set -e

          # 1. Install everything at once (single apt update)
          echo "=== Installing system packages ==="
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server cloudflared jq curl

          # 2. Sync container/ to /root/container
          echo "=== Syncing container/ ==="
          sudo mkdir -p /root/container
          if [ -d "container" ]; then
            sudo rsync -aq --delete container/ /root/container/
          fi

          # 3. Start startup.js
          echo "=== Starting app ==="
          if sudo test -f /root/container/startup.js; then
            sudo -b bash -c 'cd /root/container && node startup.js > startup.log 2>&1'
            sleep 2
            pgrep -f "node /root/container/startup.js" >/dev/null && echo "✓ startup.js running" || echo "⚠ startup.js may have failed"
          else
            echo "ℹ startup.js not found – skipping"
          fi

          # 4. Cloudflare Tunnel (using already installed cloudflared)
          echo "=== Cloudflare Tunnel ==="
          sudo cloudflared service install "${{ secrets.CLOUDFLARE_TOKEN }}"
          sleep 3
          systemctl is-active --quiet cloudflared && echo "✓ Cloudflare Tunnel running" || { echo "✗ Cloudflare Tunnel failed"; exit 1; }

      # ---- SSH & hostname ----
      - name: Configure SSH
        run: |
          [ -z "${{ secrets.PASSWORD }}" ] && { echo "✗ PASSWORD missing"; exit 1; }
          sudo hostnamectl set-hostname "${{ env.VM_NAME }}"
          echo "127.0.0.1 ${{ env.VM_NAME }}" | sudo tee -a /etc/hosts
          echo "root:${{ secrets.PASSWORD }}" | sudo chpasswd
          sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          systemctl is-active --quiet ssh && echo "✓ SSH ready" || { echo "✗ SSH failed"; exit 1; }

      # ---- Tailscale via official action (fastest) ----
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: ${{ env.VM_NAME }}
          accept-routes: true
          ssh: true
          version: "latest"

      # (Optional) Static IP – only if secrets are set
      - name: Assign static Tailscale IP
        if: env.TAILSCALE_API_KEY != '' && env.TAILSCALE_STATIC_IP != ''
        env:
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
          TAILSCALE_STATIC_IP: ${{ secrets.TAILSCALE_STATIC_IP }}
        run: |
          DEVICE_ID=$(curl -s -u "$TAILSCALE_API_KEY:" "https://api.tailscale.com/api/v2/tailnet/-/devices?fields=all" \
            | jq -r --arg name "$VM_NAME" '.devices[]? | select(.hostname==$name) | .nodeId // .id' | head -n1)
          if [ -n "$DEVICE_ID" ] && [ "$DEVICE_ID" != "null" ]; then
            curl -s -X POST "https://api.tailscale.com/api/v2/device/$DEVICE_ID/ip" \
              -u "$TAILSCALE_API_KEY:" \
              -H "Content-Type: application/json" \
              -d "{\"ipv4\": \"$TAILSCALE_STATIC_IP\"}"
            echo "✓ Static IP assigned"
          fi

      # ---- Alias ----
      - name: Create alias
        run: echo "alias c='cd /root/container'" | sudo tee -a /root/.bashrc >/dev/null

      # ---- Ultra‑light live sync (only when changes exist) ----
      - name: Live sync + keep‑alive (5.5h)
        run: |
          echo "Live sync active – polling every 5 seconds"
          MAX_DURATION_SEC=$((330 * 60))
          START=$(date +%s)
          DEADLINE=$((START + MAX_DURATION_SEC))

          while true; do
            # Only sync if remote has newer commits
            git fetch origin --quiet
            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/$(git rev-parse --abbrev-ref HEAD))
            if [ "$LOCAL" != "$REMOTE" ]; then
              git reset --hard "$REMOTE" --quiet
              [ -d "container" ] && sudo rsync -aq container/ /root/container/
              echo "✓ Updated at $(date +%H:%M:%S)"
            fi

            NOW=$(date +%s)
            if [ $NOW -ge $DEADLINE ]; then
              echo ""
              echo "⏰ 5h 30m reached → restarting workflow"
              gh workflow run "${{ github.workflow }}" --repo "${{ github.repository }}" --ref "${{ github.ref_name }}"
              exit 0
            fi

            sleep 5
          done
        env:
          GH_TOKEN: ${{ github.token }}
