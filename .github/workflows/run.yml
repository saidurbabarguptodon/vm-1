name: Run vm-1

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: Run
  cancel-in-progress: false

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set hostname
      - name: Set hostname
        run: |
          sudo hostnamectl set-hostname vm-1
          echo "127.0.0.1 vm-1" | sudo tee -a /etc/hosts

      # 3. Install and configure SSH
      - name: Install and configure SSH
        run: |
          if [ -z "${{ secrets.PASSWORD }}" ]; then echo "::error::PASSWORD secret is not set." && exit 1; fi
          sudo apt-get update -y
          sudo apt-get install -y openssh-server
          sudo bash -c "echo 'root:${{ secrets.PASSWORD }}' | chpasswd"
          sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          systemctl is-active --quiet ssh || { echo "::error::SSH failed to start."; exit 1; }

      # 4. DELETE OLD TAILSCALE (vm-1)
      - name: DELETE OLD TAILSCALE (vm-1)
        run: |
          if [ -z "${{ secrets.TAILSCALE_API_KEY }}" ]; then 
            echo "::warning::TAILSCALE_API_KEY is not set. Skipping old device cleanup."
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y jq curl
          DEVICES=$(curl -s -u "${{ secrets.TAILSCALE_API_KEY }}:" "https://api.tailscale.com/api/v2/tailnet/-/devices" || echo "{}")
          DEVICE_ID=$(echo "$DEVICES" | jq -r '.devices[]? | select(.hostname == "vm-1") | .id' | head -n 1)
          
          if [ -n "$DEVICE_ID" ] && [ "$DEVICE_ID" != "null" ]; then
            echo "Deleting old device $DEVICE_ID from Tailscale..."
            curl -s -X DELETE -u "${{ secrets.TAILSCALE_API_KEY }}:" "https://api.tailscale.com/api/v2/device/$DEVICE_ID"
            sleep 5
          else
            echo "No old Tailscale device found. Proceeding."
          fi

      # 5. INSTALL AND CONFIGURE TAILSCALE
      - name: INSTALL AND CONFIGURE TAILSCALE
        run: |
          set -e
          if [ -z "${{ secrets.TAILSCALE_AUTHKEY }}" ]; then echo "::error::Missing TAILSCALE_AUTHKEY"; exit 1; fi
          
          echo "Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          
          echo "Starting Tailscale..."
          sudo tailscale up --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" --hostname="vm-1" --accept-routes --reset

      # 6. INSTALL AND SETUP CLOUDFLARE TUNNEL
      - name: INSTALL AND SETUP CLOUDFLARE TUNNEL
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_TOKEN }}" ]; then exit 0; fi
          sudo mkdir -p /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main" | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update && sudo apt-get install -y cloudflared
          sudo cloudflared service install "${{ secrets.CLOUDFLARE_TOKEN }}"
          sleep 5
          systemctl is-active --quiet cloudflared || { echo "::error::Cloudflare failed"; exit 1; }

      # 7. CREATE ALIASES
      - name: CREATE ALIASES
        run: |
          sudo mkdir -p /root/container
          echo "alias c='cd /root/container'" | sudo tee -a /root/.bashrc

      # 8. REMOVE OLD WORKFLOW RUNS
      - name: REMOVE OLD WORKFLOW RUNS
        run: |
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then echo "::warning::GITHUB_TOKEN required"; exit 0; fi
          gh run list --workflow "${{ github.workflow }}" --repo "${{ github.repository }}" --limit 100 --json databaseId,status \
            | jq -r --arg current "${{ github.run_id }}" '.[]? | select(.status=="completed" and (.databaseId|tostring)!=$current) | .databaseId' \
            | while read id; do gh run delete "$id" --repo "${{ github.repository }}" || true; done

      # 9. DATA RSYNC AND AUTO RESTART
      - name: DATA RSYNC AND AUTO RESTART
        run: |
          if [ -d "container" ]; then
            sudo mkdir -p /root/container
            sudo rsync -a container/ /root/container/
          fi
          
          END_TIME=$(( $(date +%s) + 355*60 ))
          
          while [ $(date +%s) -lt $END_TIME ]; do
            sleep 60
          done
          
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            gh workflow run "${{ github.workflow }}" --repo "${{ github.repository }}" --ref "${{ github.ref_name }}"
          fi
