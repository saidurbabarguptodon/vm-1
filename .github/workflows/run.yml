name: Run vm-1 (Persistent Free VPS)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: Run-vm-1
  cancel-in-progress: false

jobs:
  vm-1:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # 1. CHECK REPOSITORY
      - name: CHECK REPOSITORY
        uses: actions/checkout@v4

      # 2. SETUP (DELETE OLD RUNS + INITIAL DATA SYNC + CLOUDFLARE TUNNEL)
      - name: 2. SETUP
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # DELETE ALL PREVIOUS WORKFLOW RUNS (ANY STATUS) EXCEPT CURRENT
          echo "🗑️  Removing all previous runs (any status) of this workflow..."
          gh run list --workflow "${{ github.workflow }}" \
            --repo "${{ github.repository }}" \
            --limit 200 --json databaseId,status \
            | jq -r --arg current "${{ github.run_id }}" '
              .[]? | select((.databaseId|tostring)!=$current) | .databaseId' \
            | while read id; do
                echo "Deleting run $id ..."
                gh run delete "$id" --repo "${{ github.repository }}" || true
              done
          echo "✅ All previous runs cleaned (current run ${{ github.run_id }} kept)"
          
          # INITIAL DATA SYNC (REPO container/ -> /root/container/, NO DELETE)
          if [ -d "container" ]; then
            sudo mkdir -p /root/container
            sudo rsync -a container/ /root/container/
            echo "✅ Initial sync completed (repo → VM, preserving VM-only files)"
          else
            echo "ℹ️  No 'container' folder found in repo – nothing to sync initially"
          fi

          # INSTALL AND CONFIGURE CLOUDFLARE TUNNEL
          if [ -z "${{ secrets.CLOUDFLARE_TOKEN }}" ]; then
            echo "::warning::CLOUDFLARE_TOKEN not set → skipping Cloudflare Tunnel"
          else
            sudo mkdir -p /usr/share/keyrings
            curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null
            echo "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main" | sudo tee /etc/apt/sources.list.d/cloudflared.list
            sudo apt-get update -qq && sudo apt-get install -y cloudflared
            sudo cloudflared service install "${{ secrets.CLOUDFLARE_TOKEN }}"
            sleep 4
            systemctl is-active --quiet cloudflared || { echo "::error::Cloudflare Tunnel failed"; exit 1; }
            echo "✅ Cloudflare Tunnel installed and running"
          fi

      # 3. INSTALL SSH AND CONFIGURE SSH + HOSTNAME (VM-1)
      - name: Install SSH and set hostname
        run: |
          sudo hostnamectl set-hostname vm-1
          echo "127.0.0.1 vm-1" | sudo tee -a /etc/hosts
          if [ -z "${{ secrets.PASSWORD }}" ]; then
            echo "::error::PASSWORD secret missing."
            exit 1
          fi
          sudo apt-get update -y
          sudo apt-get install -y openssh-server
          sudo bash -c "echo 'root:${{ secrets.PASSWORD }}' | chpasswd"
          sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          systemctl is-active --quiet ssh || { echo "::error::SSH failed"; exit 1; }
          echo "✅ SSH ready, hostname vm-1"

      # 4. REMOVE TAILSCALE DEVICE (VM-1)
      - name: Remove old Tailscale device
        run: |
          if [ -z "${{ secrets.TAILSCALE_API_KEY }}" ]; then
            echo "::warning::TAILSCALE_API_KEY not set. Skipping cleanup."
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y jq curl
          DEVICES=$(curl -s -u "${{ secrets.TAILSCALE_API_KEY }}:" \
            "https://api.tailscale.com/api/v2/tailnet/-/devices?fields=all" || echo '{"devices":[]}')
          DEVICE_ID=$(echo "$DEVICES" | jq -r '.devices[]? | select(.hostname=="vm-1") | .nodeId // .id' | head -n1)
          if [ -n "$DEVICE_ID" ] && [ "$DEVICE_ID" != "null" ]; then
            curl -s -X DELETE -u "${{ secrets.TAILSCALE_API_KEY }}:" \
              "https://api.tailscale.com/api/v2/device/$DEVICE_ID"
            sleep 4
            echo "✅ Removed old vm-1 device"
          else
            echo "✅ No old vm-1 device found"
          fi

      # 5. INSTALL AND CONFIGURE TAILSCALE (WITH STATIC IP FROM SECRET)
      - name: Install and configure Tailscale
        run: |
          set -e
          if [ -z "${{ secrets.TAILSCALE_AUTHKEY }}" ]; then
            echo "::error::TAILSCALE_AUTHKEY missing."
            exit 1
          fi
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up \
            --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" \
            --hostname="vm-1" \
            --accept-routes \
            --reset \
            --ssh
          sleep 4
          sudo tailscale status --json | jq -r '.Self | "✅ Tailscale connected as \(.Hostname) (\(.TailscaleIPs[0]))"'
          
          STATIC_IP="${{ secrets.TAILSCALE_STATIC_IP }}"
          API_KEY="${{ secrets.TAILSCALE_API_KEY }}"
          if [ -n "$STATIC_IP" ] && [ -n "$API_KEY" ]; then
            echo "🔍 Waiting for device to appear in API (up to 24s)..."
            DEVICE_ID=""
            for i in {1..6}; do
              DEVICES=$(curl -s -u "${API_KEY}:" \
                "https://api.tailscale.com/api/v2/tailnet/-/devices?fields=all" || echo '{"devices":[]}')
              DEVICE_ID=$(echo "$DEVICES" | jq -r '.devices[]? | select(.hostname=="vm-1") | .nodeId // .id' | head -n1)
              if [ -n "$DEVICE_ID" ] && [ "$DEVICE_ID" != "null" ]; then
                echo "✅ Found device ID: $DEVICE_ID"
                break
              fi
              sleep 4
            done
            if [ -n "$DEVICE_ID" ] && [ "$DEVICE_ID" != "null" ]; then
              echo "Setting static IPv4 to $STATIC_IP via API..."
              RESPONSE=$(curl -s -X POST \
                "https://api.tailscale.com/api/v2/device/$DEVICE_ID/ip" \
                -u "${API_KEY}:" \
                -H "Content-Type: application/json" \
                -d "{\"ipv4\": \"$STATIC_IP\"}")
              echo "API response: $RESPONSE"
              sleep 4
              echo "✅ Static IP set to $STATIC_IP"
              echo "Current Tailscale IPs: $(sudo tailscale ip -4)"
            else
              echo "::warning::Could not find vm-1 in API, static IP not set"
            fi
          else
            echo "⏭️  TAILSCALE_STATIC_IP or TAILSCALE_API_KEY not set - skipping static IP"
          fi

      # 6. CREATE ALIASES
      - name: Create aliases
        run: |
          sudo mkdir -p /root/container
          cat <<EOF | sudo tee -a /root/.bashrc
          alias c='cd /root/container'
          alias ts='tailscale status'
          alias tip='tailscale ip -4'
          EOF
          echo "✅ Aliases created (c, ts, tip)"

      # 7. LIVE DATA SYNC EVERY 3 SECONDS (REPO -> VM, NO DELETE) + AUTO RESTART (355 MIN KEEP-ALIVE)
      - name: Live data sync every 3 seconds and auto restart (max timeout)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🚀 VM running, keeping alive for 355 minutes (max timeout - 5 min buffer)..."
          echo "🔄 Syncing repo container/ → /root/container/ every 3 seconds (no deletion of VM-only files)."
          end_time=$((SECONDS + 355*60))
          while [ $SECONDS -lt $end_time ]; do
            if [ -d "container" ]; then
              sudo rsync -a container/ /root/container/ || true
              # Log line commented to reduce noise – uncomment if needed
              # echo "$(date): Sync completed"
            fi
            sleep 3
          done
          echo "⏰ Timeout reached, restarting workflow..."
          gh workflow run "${{ github.workflow }}" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"
          echo "✅ Restart triggered"
